# Usage: docker compose up -d
# Access via: http://localhost:${MEMEX_PORT:-3011}

services:
  # Backend: Memex Dashboard (Web UI + REST API)
  memex-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: memex-dashboard:${MEMEX_VERSION:-latest}
    container_name: memex-dashboard
    ports:
      - "${MEMEX_DASHBOARD_EXPOSED_PORT:-8002}:${MEMEX_DASHBOARD_PORT:-8000}"
    expose:
      - "${MEMEX_DASHBOARD_PORT:-8000}"
    volumes:
      # Wiki data (legacy + project wiki at PROJECT_ROOT/wiki)
      - ${MEMEX_WIKI_DIR:-./wiki}:/home/appuser/wiki:rw
      # Raw source data (immutable — mounted ro for safety)
      - ${MEMEX_RAW_DIR:-./raw}:/home/appuser/raw:ro
      # Multi-project support
      - ${MEMEX_PROJECTS_DIR:-./projects}:/home/appuser/projects:rw
      # Git repository persistence
      - ${MEMEX_GIT_DIR:-./.git}:/home/appuser/.git:rw
      # Project registry
      - ./projects.json:/home/appuser/projects.json:rw
      # Dashboard settings
      - ./.dashboard-settings.json:/home/appuser/.dashboard-settings.json:rw
      # Data directory for logs/misc
      - ${MEMEX_DATA_DIR:-./data}:/home/appuser/data:rw
      # Templates for project creation
      - ./templates:/home/appuser/templates:ro
      # Universe config (cross-project knowledge universe)
      - ./.memex:/home/appuser/.memex:rw
    environment:
      # Auto git commit configuration
      - GIT_AUTO_COMMIT=${MEMEX_GIT_AUTO_COMMIT:-true}
      - MEMEX_ACTIVE_PROJECT=${MEMEX_ACTIVE_PROJECT:-}
      # Timezone
      - TZ=${MEMEX_TZ:-Asia/Shanghai}
      # Dashboard settings
      - PORT=${MEMEX_DASHBOARD_PORT:-8000}
      - CLAUDE_TIMEOUT=${MEMEX_CLAUDE_TIMEOUT:-600}
      - CLAUDE_QUICK_TIMEOUT=${MEMEX_CLAUDE_QUICK_TIMEOUT:-30}
      - HEARTBEAT_INTERVAL=${MEMEX_HEARTBEAT_INTERVAL:-10}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${MEMEX_DASHBOARD_PORT:-8000}/')"]
      interval: ${MEMEX_HEALTHCHECK_INTERVAL:-30}s
      timeout: ${MEMEX_HEALTHCHECK_TIMEOUT:-10}s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "${MEMEX_LOG_MAX_SIZE:-10m}"
        max-file: "${MEMEX_LOG_MAX_FILE:-3}"
    networks:
      - memex-net

  # MCP Server (optional — for HTTP/SSE mode; stdio mode uses local Claude Code)
  memex-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    image: memex-mcp:${MEMEX_VERSION:-latest}
    container_name: memex-mcp
    ports:
      - "${MEMEX_MCP_PORT:-8081}:${MEMEX_MCP_PORT:-8081}"
    expose:
      - "${MEMEX_MCP_PORT:-8081}"
    volumes:
      # Wiki data (read-write for MCP tools)
      - ${MEMEX_WIKI_DIR:-./wiki}:/home/appuser/wiki:rw
      # Raw source data (immutable — mounted ro for safety)
      - ${MEMEX_RAW_DIR:-./raw}:/home/appuser/raw:ro
      # Multi-project support
      - ${MEMEX_PROJECTS_DIR:-./projects}:/home/appuser/projects:rw
      # Git repository persistence
      - ${MEMEX_GIT_DIR:-./.git}:/home/appuser/.git:rw
      # Project registry
      - ./projects.json:/home/appuser/projects.json:rw
      # Dashboard settings
      - ./.dashboard-settings.json:/home/appuser/.dashboard-settings.json:rw
      # Universe config (cross-project knowledge universe)
      - ./.memex:/home/appuser/.memex:rw
    environment:
      - TZ=${MEMEX_TZ:-Asia/Shanghai}
      - MEMEX_ACTIVE_PROJECT=${MEMEX_ACTIVE_PROJECT:-}
      - MEMEX_DASHBOARD_URL=${MEMEX_DASHBOARD_URL:-http://memex-dashboard:${MEMEX_DASHBOARD_PORT:-8000}}
      # Transport mode: http (nginx proxy deployment) or stdio (local Claude CLI)
      - MEMEX_MCP_TRANSPORT=${MEMEX_MCP_TRANSPORT:-http}
      - MEMEX_MCP_HOST=0.0.0.0
      - MEMEX_MCP_PORT=${MEMEX_MCP_PORT:-8081}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${MEMEX_MCP_PORT:-8081}/mcp')"]
      interval: ${MEMEX_HEALTHCHECK_INTERVAL:-30}s
      timeout: ${MEMEX_MCP_HEALTHCHECK_TIMEOUT:-5}s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "${MEMEX_LOG_MAX_SIZE:-10m}"
        max-file: "${MEMEX_LOG_MAX_FILE:-3}"
    networks:
      - memex-net

  # Frontend: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: memex-nginx
    ports:
      - "${MEMEX_PORT:-3011}:3011"
    entrypoint: /bin/sh -c "envsubst '$$NGINX_DASHBOARD_PORT $$NGINX_MCP_PORT $$NGINX_PROXY_TIMEOUT $$NGINX_LISTEN_PORT $$NGINX_WORKER_CONNECTIONS $$NGINX_CLIENT_MAX_BODY_SIZE $$NGINX_KEEPALIVE_TIMEOUT' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    environment:
      - NGINX_DASHBOARD_PORT=${MEMEX_DASHBOARD_PORT:-8000}
      - NGINX_MCP_PORT=${MEMEX_MCP_PORT:-8081}
      - NGINX_PROXY_TIMEOUT=${MEMEX_PROXY_TIMEOUT:-300}
      - NGINX_LISTEN_PORT=3011
      - NGINX_WORKER_CONNECTIONS=${MEMEX_NGINX_WORKER_CONNECTIONS:-1024}
      - NGINX_CLIENT_MAX_BODY_SIZE=${MEMEX_CLIENT_MAX_BODY_SIZE:-100m}
      - NGINX_KEEPALIVE_TIMEOUT=${MEMEX_KEEPALIVE_TIMEOUT:-65}
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - ${MEMEX_SSL_DIR:-./ssl}:/etc/nginx/ssl:ro
      - ${MEMEX_STATIC_DIR:-./static}:/usr/share/nginx/html/static:ro
    depends_on:
      memex-dashboard:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:${NGINX_LISTEN_PORT:-3011}/health"]
      interval: ${MEMEX_HEALTHCHECK_INTERVAL:-30}s
      timeout: ${MEMEX_HEALTHCHECK_TIMEOUT:-10}s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "${MEMEX_LOG_MAX_SIZE:-10m}"
        max-file: "${MEMEX_LOG_MAX_FILE:-3}"
    networks:
      - memex-net

networks:
  memex-net:
    driver: bridge
