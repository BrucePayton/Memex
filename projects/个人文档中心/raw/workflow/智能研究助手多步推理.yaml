id: example_agent_research
name: 智能研究助手多步推理
version: v1.0
description: 接收研究课题，自主规划分解、检索资料、调用工具分析，生成结构化研究报告
chainTypeId: agent
steps:
  - id: a1
    type: agent_input
    label: 接收研究课题
    position:
      x: 60
      'y': 200
    description: 用户输入研究方向与要求
  - id: a2
    type: agent_perceive
    label: 意图解析
    position:
      x: 260
      'y': 200
    description: 提取关键实体、范围、输出要求
    metadata:
      model: GPT-4o
  - id: a3
    type: agent_plan
    label: 任务分解
    position:
      x: 460
      'y': 200
    description: 拆分为3-5个子研究任务
    metadata:
      model: GPT-4o
      temperature: '0.2'
  - id: a4
    type: agent_memory
    label: 历史记忆检索
    position:
      x: 460
      'y': 360
    description: 检索相关历史研究记录
    metadata:
      memory_type: 向量记忆
  - id: a5
    type: agent_tool
    label: 资料搜索
    position:
      x: 660
      'y': 120
    description: 调用Bing Search + 学术API
    metadata:
      tools_list:
        - Bing Search
        - Google Scholar
        - ArXiv
  - id: a6
    type: agent_tool
    label: 数据分析
    position:
      x: 660
      'y': 300
    description: Python代码执行数据分析
    metadata:
      tools_list:
        - Python代码执行
        - Pandas
        - Matplotlib
  - id: a7
    type: agent_decide
    label: 信息充分判断
    position:
      x: 860
      'y': 200
    description: 资料是否足以支撑结论？
  - id: a8
    type: agent_reflect
    label: 质量反思
    position:
      x: 1060
      'y': 120
    description: 反思逻辑漏洞与信息偏差
    metadata:
      model: GPT-4o
      temperature: '0.1'
  - id: a9
    type: agent_output
    label: 生成研究报告
    position:
      x: 1260
      'y': 200
    description: 输出结构化Markdown报告
    metadata:
      output_format: Markdown
edges:
  - id: e1
    source: a1
    target: a2
  - id: e2
    source: a2
    target: a3
  - id: e3
    source: a3
    target: a4
  - id: e4
    source: a3
    target: a5
  - id: e5
    source: a4
    target: a6
  - id: e6
    source: a5
    target: a7
  - id: e7
    source: a6
    target: a7
  - id: e8
    source: a7
    target: a8
    label: 信息充分
  - id: e9
    source: a7
    target: a5
    label: 继续搜索
  - id: e10
    source: a8
    target: a9
