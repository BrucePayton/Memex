id: procurement-approval-sop-v1
name: 采购审批流程SOP
version: '1.0'
description: 采购审批流程SOP，包含财务初审、技术评审并行，金额超50万元需副总审批的条件分支。
department: 采购部
owner: 采购部
color: blue
chainTypeId: business
steps:
  - id: s-start
    type: start
    label: 接收采购申请
    tools:
      - name: 采购申请单模板（Word）
        type: template
        purpose: 用于填写新采购申请的标准化表单，确保信息完整。
        category: document
  - id: s-fork-review
    type: parallel-fork
    label: 并行评审启动
  - id: s-task-financial
    type: task
    label: 财务初审
    description: 财务初审需在3个工作日内完成，使用审批系统（OA）进行操作。
    duration: 3个工作日
    sla: 3个工作日
    systems:
      - name: OA系统
        type: oa
        purpose: 执行财务初审操作，支持审批流管理与SLA监控
        key_deadlines:
          - event: 财务初审开始
            deadline: 3个工作日
    risks:
      - step_id: s-task-financial
        description: 财务初审超时未完成，因无预警机制导致延误。
        level: high
        impact: 流程停滞，影响后续审批节点时间线。
        mitigation: 系统设置SLA倒计时提醒与自动催办功能。
        source: 财务初审需在3个工作日内完成
      - step_id: s-task-technical
        description: 技术评审与财务初审并行但缺乏进度同步机制。
        level: medium
        impact: 评审结果汇合延迟，影响整体流程时效。
        mitigation: 建立并行任务统一进度看板，实时监控状态。
        source: 技术评审与财务初审并行，截止时间同为3个工作日
      - step_id: s-task-senior
        description: 副总审批责任不明确，存在审批空窗期风险。
        level: high
        impact: 关键审批环节无人响应，导致流程中断。
        mitigation: 指定主责人并配置自动待办提醒与超时上报机制。
        source: 金额>50万元需副总审批
  - id: s-task-technical
    type: task
    label: 技术评审
    description: 技术评审与财务初审并行，截止时间同为3个工作日，使用审批系统（OA）进行操作。
    duration: 3个工作日
    sla: 3个工作日
    systems:
      - name: OA系统
        type: oa
        purpose: 执行技术评审操作，支持并行任务分发与时限控制
        key_deadlines:
          - event: 技术评审开始
            deadline: 3个工作日
  - id: s-join
    type: parallel-join
    label: 评审结果汇聚
    risks:
      - step_id: s-join
        description: 评审结果汇聚点未设校验机制，可能遗漏任一评审意见。
        level: medium
        impact: 错误合并结果，引发审批依据缺失或决策失误。
        mitigation: 系统强制要求双评审均提交后方可进入下一节点。
        source: 评审结果汇聚
  - id: s-gateway-amount
    type: gateway
    label: 金额是否 > 50万元？
    description: 判断采购金额是否超过50万元，决定是否进入副总审批环节。
  - id: s-task-senior
    type: task
    label: 副总审批
    description: 副总审批，需在1个工作日内完成。
    duration: 1个工作日
    sla: 1个工作日
  - id: s-contract-gen
    type: task
    label: 生成合同
    description: 审批通过后生成合同，使用合同模板，录入审批系统（OA）。
    systems:
      - name: OA系统
        type: oa
        purpose: 调用合同模板并录入审批数据，启动合同创建流程
        key_deadlines: []
      - name: ERP系统
        type: erp
        purpose: 接收合同创建请求，完成合同在系统中的正式建档与管理
        key_deadlines: []
    tools:
      - name: 合同模板（PDF）
        type: template
        purpose: 审批通过后生成正式合同的标准化文件，保证条款一致性。
        category: document
      - name: 邮件通知审批状态
        type: communication
        purpose: 向相关方发送审批结果，确保流程透明与及时沟通。
        category: communication
    risks:
      - step_id: s-contract-gen
        description: 合同生成依赖审批结果，但触发条件不明确。
        level: medium
        impact: 审批通过后未及时生成合同，影响交付周期。
        mitigation: 设置审批通过后自动触发合同生成的规则引擎。
        source: 审批通过后生成合同，使用合同模板，录入审批系统（OA）
  - id: s-end
    type: end
    label: 归档结束
edges:
  - id: e1
    source: s-start
    target: s-fork-review
    type: default
    animated: false
  - id: e2
    source: s-fork-review
    target: s-task-financial
    type: default
    animated: false
  - id: e3
    source: s-fork-review
    target: s-task-technical
    type: default
    animated: false
  - id: e4
    source: s-task-financial
    target: s-join
    type: default
    animated: false
  - id: e5
    source: s-task-technical
    target: s-join
    type: default
    animated: false
  - id: e6
    source: s-join
    target: s-gateway-amount
    type: default
    animated: false
  - id: e7
    source: s-gateway-amount
    target: s-contract-gen
    label: 金额 ≤ 50万元
    type: default
    animated: false
  - id: e8
    source: s-gateway-amount
    target: s-task-senior
    label: 金额 > 50万元
    type: conditional
    animated: false
  - id: e9
    source: s-task-senior
    target: s-contract-gen
    type: default
    animated: false
  - id: e11
    source: s-contract-gen
    target: s-end
    type: default
    animated: false
