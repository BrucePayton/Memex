id: flow-2024-sunlife-year-end
name: 2024年寿险机构集中项目年结决算工作流程
version: '1.0'
description: >-
  2024年寿险机构集中项目年结决算工作流程，依据通知中明确的时间节点与依赖关系构建，包含预算、费用、总账、税务等模块的链式任务推进，关键节点以截止时间为准，TMS系统有特殊回销与制证子流程。并行仅在原文明确支持时使用（如TMS与OF制证），其余按时间轴顺序连接。
department: 金服财务服务中心
owner: 金服产品线
color: blue
steps:
  - id: s-start
    type: start
    label: 启动2024年寿险机构集中项目年结工作
  - id: s-budget-e-purchase
    type: task
    label: 预算 - E采费用类下单截止
    description: E采购系统下单，确保12月19日18:00前完成；涉及预算模块，责任主体为各机构预算负责人。
    sla: 12月19日18:00前
    systems:
      - name: E采购系统
        type: procurement
        purpose: 预算模块下单，确保12月19日18:00前完成费用类下单
        key_deadlines:
          - event: E采购系统下单截止
            deadline: 12月19日18:00
    databases:
      - name: E采购系统
        type: mysql
        operation: write
        source_system: E采购
        purpose: 预算 - E采费用类下单截止，确保12月19日18:00前完成下单操作
        validation_rules:
          - rule: 必须在12月19日18:00前完成所有费用类下单
            severity: high
    tools:
      - name: E采购系统下单模板
        type: template
        purpose: 指导各机构预算负责人在12月19日18:00前完成E采费用类下单，确保预算模块任务按时推进。
        category: collaboration
      - name: 签报审核沟通群组
        type: communication
        purpose: 用于远程费用端与预提负责人协同处理年底异常件（如关账当日分摊单、报销在途单），保障单据及时入账或预提。
        category: communication
    risks:
      - step_id: s-budget-e-purchase
        description: E采购系统下单延迟，导致预算模块无法按时推进
        level: high
        impact: 影响后续费用、总账等模块流程，造成年结整体延误
        mitigation: 设置系统自动提醒，提前24小时预警截止时间
        source: 12月19日18:00截止
      - step_id: s-cost-ap-scan
        description: 后援AP扫描遗漏或未完成，影响费用入账完整性
        level: medium
        impact: 导致费用数据缺失，影响损益计提与账务平衡
        mitigation: 建立扫描完成确认机制，由机构负责人签字闭环
        source: 12月25日18:00截止
      - step_id: s-cost-asset-scan
        description: 资产凭证漏扫，中心不再接受，造成数据无法补录
        level: high
        impact: 关键凭证缺失，影响固定资产核算与审计合规
        mitigation: 在12月27日前进行预检查并提交扫描清单备案
        source: 12月28日起中心不再接受扫描
  - id: s-cost-ap-scan
    type: task
    label: 费用 - 后援AP扫描截止
    description: 后援AP系统扫描，确保12月25日18:00前完成；涉及费用模块，责任主体为各机构费用经办人。
    sla: 12月25日18:00前
    systems:
      - name: 后援AP系统
        type: crm
        purpose: 费用模块扫描，确保12月25日18:00前完成
        key_deadlines:
          - event: 后援AP系统扫描截止
            deadline: 12月25日18:00
    databases:
      - name: 后援AP系统
        type: oracle
        operation: read
        source_system: 后援AP
        purpose: 费用 - 后援AP扫描截止，确保12月25日18:00前完成扫描
        validation_rules:
          - rule: 必须在12月25日18:00前完成扫描并上传至系统
            severity: high
    tools:
      - name: 后援AP系统扫描操作底稿
        type: document
        purpose: 规范后援AP系统扫描流程，确保12月25日18:00前完成扫描，避免影响后续费用模块处理。
        category: document
      - name: 专项沟通群组
        type: communication
        purpose: 支持各机构费用经办人与远程费用端就扫描异常问题进行快速联动，提升处理效率。
        category: communication
  - id: s-cost-asset-scan
    type: task
    label: 费用 - 资产凭证扫描截止
    description: 各机构资产凭证扫描，确保12月28日前完成；12月28日起中心不再接受扫描。
    sla: 12月28日前
    systems:
      - name: 后援AP系统
        type: crm
        purpose: 各机构资产凭证扫描，确保12月28日前完成
        key_deadlines:
          - event: 资产凭证扫描截止
            deadline: 12月28日
    databases:
      - name: 资产凭证扫描系统
        type: mysql
        operation: write
        source_system: 各机构资产凭证扫描
        purpose: 费用 - 资产凭证扫描截止，确保12月28日前完成扫描
        validation_rules:
          - rule: 12月28日起中心不再接受扫描，需确保数据及时上传
            severity: high
    tools:
      - name: 资产凭证扫描操作指南
        type: document
        purpose: 指导各机构在12月28日前完成资产凭证扫描，确保中心不再接受后续提交。
        category: document
      - name: 共享盘-年结资产扫描资料库
        type: collaboration
        purpose: 集中存放各机构资产凭证扫描相关文件，便于统一核查与归档。
        category: collaboration
  - id: s-cost-newfas-close
    type: task
    label: 费用 - NEWFAS报销模块关闭及损益计提
    description: NEWFAS报销模块关闭，确保12月31日18:00前完成；同时完成损益计提。
    sla: 12月31日18:00前
    systems:
      - name: NEWFAS报销系统
        type: business
        purpose: 费用模块关闭及损益计提，确保12月31日18:00前完成
        key_deadlines:
          - event: NEWFAS报销模块关闭
            deadline: 12月31日18:00
      - name: OF系统
        type: erp
        purpose: 接收NEWFAS导出的GL数据，用于过账
        key_deadlines:
          - event: NEWFAS导GL数据频率调整
            deadline: 年结期间每5分钟一次
    databases:
      - name: NEWFAS报销模块
        type: mysql
        operation: update
        source_system: NEWFAS
        purpose: 费用 - NEWFAS报销模块关闭及损益计提，确保12月31日18:00前完成模块关闭与损益计提
        validation_rules:
          - rule: 必须在12月31日18:00前完成模块关闭，且损益计提完整准确
            severity: high
    tools:
      - name: NEWFAS报销模块关闭检查清单
        type: document
        purpose: 用于确认12月31日18:00前完成模块关闭及损益计提，确保费用类数据完整。
        category: document
      - name: 印花税测算底稿
        type: document
        purpose: 依据税务同事提供的底稿，在12月31日18:00前完成印花税计提及入账，区分归属业务段。
        category: document
      - name: 增值税测算底稿
        type: document
        purpose: 用于1月3日前完成进项税转出比例调整、附加税计提等税务处理。
        category: document
      - name: 财智云费用分摊模块操作手册
        type: document
        purpose: 指导各机构在1月1日前完成往来流程创建，并于1月3日前完成所有未确认流程的确认。
        category: document
    risks:
      - step_id: s-cost-newfas-close
        description: NEWFAS报销模块关闭前未完成数据处理，导致损益计提失败
        level: high
        impact: 损益数据不准确，影响财务报表真实性
        mitigation: 设置系统自动校验，关闭前强制检查未完成单据
        source: 12月31日18:00前完成
      - step_id: s-cost-newfas-close
        description: 未及时完成OF过账，影响总账期间关闭
        level: medium
        impact: 凭证未上传至OF，导致总账无法闭合
        mitigation: 要求各机构在关闭前提交OF过账完成截图存档
        source: 各机构务必核实费用类凭证已完成OF过账
      - step_id: s-cost-newfas-close
        description: 预提事项未同步，远程费用端无法核对完整性
        level: medium
        impact: 预提遗漏，影响权责发生制执行与账务准确性
        mitigation: 建立签报与预提联动机制，自动推送待处理清单
        source: 如临近年底仍未审核到上述预算端反馈的报销单据，则将此部分签报号反馈至预提负责人
  - id: s-gateway-pre-accrual-check
    type: gateway
    label: 预提类事项是否需补充处理？
    description: 根据《预提账务处理办法(2024版)》执行预提，若签报审核结果需补充处理，则进入额外确认流程。
    risks:
      - step_id: s-gateway-pre-accrual-check
        description: 预提事项判断失误，遗漏需补充处理项
        level: medium
        impact: 预提不完整，影响损益准确性
        mitigation: 依据《预提账务处理办法(2024版)》生成标准检查清单
        source: 根据《预提账务处理办法(2024版)》执行预提
      - step_id: s-gateway-pre-accrual-check
        description: 差旅费等特殊预提未获总部邮件批准即执行
        level: high
        impact: 违规预提，引发内控风险与审计问题
        mitigation: 系统强制要求上传总部同意邮件方可提交预提申请
        source: 差旅费、市内交通、招待费原则上不予预提，如确需预提需要总部同意的邮件或签报
      - step_id: s-gateway-pre-accrual-check
        description: 预提补充处理未闭环，责任主体不清
        level: medium
        impact: 处理断档，影响总账闭合进度
        mitigation: 明确远程费用端与预提负责人双人确认机制
        source: 由远程费用端与预提负责人协同完成
  - id: s-pre-accrual-confirmation
    type: task
    label: 预提补充处理确认
    description: 如需补充处理，由远程费用端与预提负责人协同完成，确保预提完整性。
  - id: s-totals-las-cds-tms-close
    type: task
    label: 总账 - LAS/CDS/TMS系统期间关闭
    description: LAS、CDS、TMS系统期间关闭，1月1日完成；需检查系统中是否存在未制证单据。
    sla: 1月1日
    systems:
      - name: LAS系统
        type: erp
        purpose: 总账模块期间关闭，需检查未制证单据
        key_deadlines:
          - event: LAS系统期间关闭
            deadline: 1月1日
      - name: CDS系统
        type: erp
        purpose: 总账模块期间关闭，需检查未制证单据
        key_deadlines:
          - event: CDS系统关闭
            deadline: 1月1日
      - name: TMS系统
        type: erp
        purpose: 总账模块期间关闭，需检查未回销数据
        key_deadlines:
          - event: TMS系统关闭
            deadline: 1月1日
    databases:
      - name: LAS系统
        type: oracle
        operation: readwrite
        source_system: LAS
        purpose: 总账 - LAS/CDS/TMS系统期间关闭，1月1日完成，需检查是否存在未制证单据
        validation_rules:
          - rule: 1月1日需检查系统中是否存在未制证单据
            severity: high
      - name: CDS系统
        type: oracle
        operation: readwrite
        source_system: CDS
        purpose: 总账 - LAS/CDS/TMS系统期间关闭，1月1日完成，需检查是否存在未制证单据
        validation_rules:
          - rule: 1月1日需检查系统中是否存在未制证单据
            severity: high
      - name: TMS系统
        type: mysql
        operation: readwrite
        source_system: TMS
        purpose: 总账 - LAS/CDS/TMS系统期间关闭，1月1日完成，需检查是否存在未制证单据
        validation_rules:
          - rule: 1月1日需检查系统中是否存在未制证单据
            severity: high
    risks:
      - step_id: s-totals-las-cds-tms-close
        description: 系统关闭前未检查是否存在未制证单据，导致账务异常
        level: high
        impact: 未制证单据遗留，引发总账不平与审计风险
        mitigation: 系统自动导出未制证清单，生成待办任务强制处理
        source: 需检查系统中是否存在未制证单据
      - step_id: s-totals-las-cds-tms-close
        description: CDS/TMS系统关闭后仍操作12月数据，违反管控要求
        level: high
        impact: 数据篡改风险，影响年结结果可追溯性
        mitigation: 设置系统权限控制，关闭后禁止12月数据修改
        source: 2日起未经总公司同意，不得在CDS系统中对12月数据进行录入、确认、制证等操作
      - step_id: s-totals-las-cds-tms-close
        description: TMS回销未完成即进入下一环节，影响制证上传
        level: medium
        impact: 制证延迟，影响总账期间关闭进度
        mitigation: 在TMS系统中设置回销状态标记，强制完成才允许流转
        source: 12月31日前完成费用付款批次回销
  - id: s-tms-special-process
    type: task
    label: TMS系统回销与制证专项流程
    description: TMS系统特殊要求：12月31日前完成费用付款批次回销；1月2日前完成制证上传至OF；检查已回盘但未资金确认的数据。
    sla: 1月2日前完成制证上传
    systems:
      - name: TMS系统
        type: erp
        purpose: 执行费用付款批次回销及制证上传至OF，确保1月2日前完成制证上传
        key_deadlines:
          - event: TMS制证上传至OF完成
            deadline: 1月2日前
      - name: OF系统
        type: erp
        purpose: 接收TMS系统制证并完成过账
        key_deadlines:
          - event: TMS制证上传至OF完成
            deadline: 1月2日前
    databases:
      - name: TMS系统
        type: mysql
        operation: write
        source_system: TMS
        purpose: TMS系统回销与制证专项流程：12月31日前完成费用付款批次回销；1月2日前完成制证上传至OF
        validation_rules:
          - rule: 12月31日前完成已资金确认数据的回销
            severity: high
          - rule: 1月2日前完成制证并上传至OF系统
            severity: high
    risks:
      - step_id: s-tms-special-process
        description: TMS制证未在1月2日前上传至OF，导致总账无法闭合
        level: high
        impact: 制证延迟，影响往来确认与税金计提
        mitigation: 设置上传成功通知机制，失败自动触发预警
        source: 1月2日前完成制证上传至OF
      - step_id: s-tms-special-process
        description: 未处理已回盘但未资金确认的数据，引发系统锁定
        level: medium
        impact: 系统无法操作，需人工干预，增加处理成本
        mitigation: 在检查节点前完成所有回盘数据的资金确认
        source: 如果超过两个月还没有处理资金确认，则不能前台操作
      - step_id: s-tms-special-process
        description: TMS系统操作越权，未经总部审批修改12月数据
        level: high
        impact: 数据被非法修改，破坏年结数据一致性
        mitigation: 实施审批留痕机制，所有操作需附总部邮件授权
        source: 3日起未经总公司同意，不得在TMS系统中对12月数据进行录入、确认、制证等操作
  - id: s-tms-final-check
    type: task
    label: TMS系统最终检查
    description: TMS系统最终检查，确认无未处理异常数据。
    systems:
      - name: TMS系统
        type: erp
        purpose: 最终检查，确认无未处理异常数据
        key_deadlines: []
    databases:
      - name: TMS系统
        type: mysql
        operation: read
        source_system: TMS
        purpose: TMS系统最终检查，确认无未处理异常数据
        validation_rules:
          - rule: 检查是否存在未回销或未确认的数据
            severity: high
  - id: s-totals-final-close
    type: task
    label: 总账 - 往来确认、税金计提与总账期间关闭
    description: 1月3日完成往来自动制证确认、增值税附加计提、总账期间关闭；需检查系统中是否存在未确认凭证。
    sla: 1月3日
    systems:
      - name: 财智云费用分摊模块
        type: business
        purpose: 处理内部往来流程，确保1月3日前完成所有流程确认
        key_deadlines:
          - event: 财智云费用分摊模块未确认流程清零
            deadline: 1月3日16:00
      - name: OF系统
        type: erp
        purpose: 接收往来自动制证数据，完成总账期间关闭
        key_deadlines:
          - event: 总账期间关闭
            deadline: 1月3日
      - name: LAS系统
        type: erp
        purpose: 检查是否存在未确认凭证
        key_deadlines:
          - event: LAS系统未确认凭证检查
            deadline: 1月3日
      - name: CDS系统
        type: erp
        purpose: 检查是否存在未确认凭证
        key_deadlines:
          - event: CDS系统未确认凭证检查
            deadline: 1月3日
      - name: TMS系统
        type: erp
        purpose: 检查是否存在未确认凭证
        key_deadlines:
          - event: TMS系统未确认凭证检查
            deadline: 1月3日
      - name: 综合财务平台
        type: erp
        purpose: 检查是否存在未确认凭证
        key_deadlines:
          - event: 综合财务平台未确认凭证检查
            deadline: 1月3日
      - name: 单证系统
        type: erp
        purpose: 检查是否存在未确认凭证
        key_deadlines:
          - event: 单证系统未确认凭证检查
            deadline: 1月3日
    databases:
      - name: 财智云费用分摊模块
        type: mysql
        operation: readwrite
        source_system: 财智云费用分摊模块
        purpose: 往来自动制证所有流程确认完毕，结平往来；1月3日前完成增值税科目结转及内部往来处理
        validation_rules:
          - rule: 1月3日前完成所有往来流程确认，确保无未确认流程
            severity: high
      - name: OF系统
        type: oracle
        operation: readwrite
        source_system: OF
        purpose: 总账 - 往来确认、税金计提与总账期间关闭，1月3日完成过账与凭证确认
        validation_rules:
          - rule: 1月3日需检查系统中是否存在未确认凭证
            severity: high
    risks:
      - step_id: s-totals-final-close
        description: 往来自动制证未确认，导致账务不平
        level: high
        impact: 总账期间无法关闭，影响年度报表出具
        mitigation: 系统自动检查财智云模块未确认流程，生成待办任务
